<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipForge</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      background: #22c55e;
      color: black;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>ClipForge</h1>

    <p>
      AI platform that turns videos into short clips with highlights, captions, and effects automatically.
    </p>

    <div class="badge">
      TikTok Developer Integration
    </div>

    <div class="footer">
      © 2026 ClipForge • AI Video Automation
    </div>

  </div>
</body>
</html>
